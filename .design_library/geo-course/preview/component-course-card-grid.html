<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CourseCardGrid – GEO Course</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: 12px; background: var(--color-background-secondary); font-family: var(--font-family-base); color: var(--color-text-primary); }
.row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; }
.label { min-width: 92px; font-size: var(--font-size-xs); color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .5px; padding-top: 4px; flex-shrink: 0; line-height: 1; }
.divider { border: none; border-top: 1px solid var(--color-divider); margin: 8px 0; }

/* @component-css-start */
.course-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-base); width: 100%; }
.course-card { background: var(--color-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); overflow: hidden; display: flex; flex-direction: column; transition: filter .15s; }
.course-card:hover { filter: brightness(0.97); }
.course-card__image { height: 100px; background: linear-gradient(135deg, var(--color-primary-lighter), var(--color-primary-light)); }
.course-card__body { padding: var(--space-md); display: flex; flex-direction: column; gap: var(--space-xs); flex: 1; min-width: 0; }
.course-card__title { font-size: var(--font-size-base); font-weight: 600; color: var(--color-text-primary); line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.course-card__subtitle { font-size: var(--font-size-xs); color: var(--color-text-tertiary); }
.course-card__meta { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: var(--space-xs); }
.course-card__rating { display: inline-flex; align-items: center; gap: 2px; flex-shrink: 0; }
.course-card__rating-num { font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-left: 2px; }
.course-card__price { font-size: var(--font-size-md); font-weight: 700; color: var(--color-primary); white-space: nowrap; flex-shrink: 0; }
.course-card__enroll { font-size: var(--font-size-xs); color: var(--color-text-tertiary); white-space: nowrap; }
.star-icon { width: 12px; height: 12px; flex-shrink: 0; }
/* @component-css-end */
</style>
</head>
<body>
