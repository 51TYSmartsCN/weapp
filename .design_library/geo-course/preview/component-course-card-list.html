<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CourseCardList - GEO Course</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: 12px; background: var(--color-background-secondary); font-family: var(--font-family-base); color: var(--color-text-primary); }
.specimen { display: flex; flex-direction: column; gap: 8px; }
.story { display: flex; flex-direction: column; gap: 8px; }
.rail { display: flex; flex-direction: column; gap: var(--space-base); width: 100%; }
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.label { font-size: var(--type-xs); color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; min-width: 92px; flex-shrink: 0; }
.divider { border: none; border-top: 1px solid var(--color-border-light); margin: 4px 0; }

/* @component-css-start */
.ccl { display: flex; flex-direction: row; align-items: center; background: var(--color-surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: var(--space-md); gap: var(--space-md); width: 100%; overflow: hidden; transition: filter .15s; }
.ccl:hover { filter: brightness(0.97); }
.ccl__thumb { width: 120px; height: 90px; border-radius: var(--radius-sm); flex-shrink: 0; background: var(--color-background-tertiary); display: flex; align-items: center; justify-content: center; }
.ccl__thumb-icon { opacity: 0.25; }
.ccl__body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: var(--space-sm); }
.ccl__title { font-size: var(--type-base); font-weight: 600; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
.ccl__meta { display: flex; align-items: center; gap: var(--space-xs); font-size: var(--type-sm); color: var(--color-text-secondary); line-height: 1.4; }
.ccl__star { display: inline-flex; align-items: center; gap: 2px; color: var(--color-warning); flex-shrink: 0; }
.ccl__dot { color: var(--color-text-tertiary); flex-shrink: 0; }
.ccl__footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
.ccl__price { font-size: var(--type-md); font-weight: 700; color: var(--color-error); white-space: nowrap; }
.ccl__enroll { font-size: var(--type-sm); color: var(--color-text-tertiary); white-space: nowrap; }
/* @component-css-end */
</style>
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
<symbol id="i-star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></symbol>

<div class="specimen">

<span class="ccl__dot">·</span>

</div>

</div>
</div>
</div>

<div class="ccl__footer">
